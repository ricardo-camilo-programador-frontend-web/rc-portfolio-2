name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validar Linting e Formatacao
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Executar Lint
        run: pnpm run lint:check

  build:
    name: Build do Projeto
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      VITE_PORTFOLIO_URL: "https://ricardo-camilo.netlify.app"
      VITE_GITHUB_URL: "https://github.com/ricardo-camilo-programador-frontend-web"
      VITE_LINKEDIN_URL: "https://www.linkedin.com/in/ricardo-camilo"
      VITE_X_URL: "https://x.com/ricardocamilo"
      VITE_INSTAGRAM_URL: "https://www.instagram.com/ricardocamilo"
      VITE_YOUTUBE_URL: "https://www.youtube.com/@ricardocamilo"
      VITE_99FREELAS_URL: "https://www.99freelas.com.br/perfil/ricardo-camilo"
      VITE_WORKANA_URL: "https://www.workana.com/freelancer/ricardocamilo"
      VITE_BUYMEACOFFEE_URL: "https://www.buymeacoffee.com/ricardocamilo"
      VITE_FACEBOOK_URL: "https://www.facebook.com/ricardocamilo"
      VITE_FIGMA_URL: "https://www.figma.com/@ricardocamilo"
      VITE_CONTACT_EMAIL: "contato@ricardocamilo.com"
      VITE_GA_MEASUREMENT_ID: ""
      VITE_GTM_ID: ""
      VITE_COUNTER_DEV_ID: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build do projeto
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  security:
    name: Auditoria de Seguranca
    runs-on: self-hosted
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Auditoria de vulnerabilidades
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"

          pnpm audit --audit-level high 2>&1 | tee "$LOG_FILE"
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" "$LOG_FILE" && grep -Eq "responded with 5[0-9]{2}([^0-9]|$)|error \(5[0-9]{2}\)" "$LOG_FILE"; then
            echo "::warning::pnpm audit falhou por erro 5xx do endpoint de auditoria da npm."
            exit 0
          fi

          exit "$status"

  sonar:
    name: Analise SonarQube
    runs-on: self-hosted
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Instalar dependencias
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install --frozen-lockfile --ignore-scripts
          elif [ -f package-lock.json ]; then npm ci
          fi

      - name: Run SonarScanner
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::notice::SONAR_TOKEN not configured, skipping SonarQube analysis."
            exit 0
          fi
          /opt/sonar-scanner/bin/sonar-scanner

  deploy:
    name: Deploy Netlify
    runs-on: self-hosted
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx netlify deploy --prod --dir=dist --skip-build || npx netlify deploy --prod --dir=dist
