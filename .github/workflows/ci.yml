name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Secret scan (TruffleHog)
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  # ──────────────────────────────────────────────
  # 2. Validate (type-check + biome + build)
  # ──────────────────────────────────────────────
  validate:
    name: Validate (tsc + biome + build)
    runs-on: ubuntu-latest
    needs: [secret-scan]
    timeout-minutes: 15
    env:
      VITE_PORTFOLIO_URL: ""
      VITE_GITHUB_URL: ""
      VITE_LINKEDIN_URL: ""
      VITE_X_URL: ""
      VITE_INSTAGRAM_URL: ""
      VITE_YOUTUBE_URL: ""
      VITE_99FREELAS_URL: ""
      VITE_WORKANA_URL: ""
      VITE_BUYMEACOFFEE_URL: ""
      VITE_FACEBOOK_URL: ""
      VITE_FIGMA_URL: ""
      VITE_CONTACT_EMAIL: ""
      VITE_GA_MEASUREMENT_ID: ""
      VITE_GTM_ID: ""
      VITE_COUNTER_DEV_ID: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm + Node + cache
        uses: ./.github/actions/setup-pnpm-cache

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec biome check --write src/
        continue-on-error: true

      - name: Lint (check only)
        run: pnpm exec biome check src/
        continue-on-error: true

      - name: Build
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────
  # 3. Commit message lint (PR only)
  # ──────────────────────────────────────────────
  commit-lint:
    name: Commit Lint (gitmoji)
    runs-on: ubuntu-latest
    needs: [secret-scan]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate gitmoji format
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PATTERN="^:[a-z_]+:\s[a-z]+([a-z-]*)?(\([a-zA-Z0-9/_.-]+\)): .+"

          echo "Validating commits from $BASE_SHA..$HEAD_SHA"
          FAILED=0

          for COMMIT in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            MSG=$(git log -1 --format="%s" "$COMMIT")
            PARENTS=$(git rev-list --parents -1 "$COMMIT" | wc -w)
            if [ "$PARENTS" -gt 2 ]; then
              echo "  Skipping merge commit: $MSG"
              continue
            fi
            if ! echo "$MSG" | grep -qE "$PATTERN"; then
              echo "  ❌ Invalid commit: $MSG"
              echo "      Expected: :emoji: type(scope): description"
              FAILED=1
            else
              echo "  ✅ $MSG"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "Some commits do not follow gitmoji convention."
            echo "  Pattern: :emoji: type(scope): description"
            echo "  Example: :sparkles: feat(hero): add social links"
            exit 1
          fi
          echo "All commits valid!"

  # ──────────────────────────────────────────────
  # 4. PR base validation (PR only)
  # ──────────────────────────────────────────────
  validate-pr-base:
    name: Validate PR Base
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR target branch
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          echo "PR: $HEAD -> $BASE"
          if [ "$BASE" = "main" ] && [ "$HEAD" != "develop" ]; then
            echo "❌ PRs to main are only allowed from develop."
            echo "   Current head: $HEAD"
            echo "   Please target develop instead."
            exit 1
          fi
          echo "✅ PR base validation passed."

  # ──────────────────────────────────────────────
  # 5. Preview deploy (PR only)
  # ──────────────────────────────────────────────
  preview:
    name: Preview Deploy
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request' && needs.validate.result == 'success'
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Deploy Preview
        id: deploy
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          netlify deploy \
            --alias="pr-${PR_NUMBER}" \
            --dir=dist \
            --json > /tmp/deploy.json 2>/tmp/deploy.err || {
            cat /tmp/deploy.err
            exit 1
          }
          PREVIEW_URL=$(jq -r '.deploy_url // .url // empty' /tmp/deploy.json)
          echo "preview_url=${PREVIEW_URL}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- netlify-preview -->';
            const body = `${marker}\n## 🚀 Preview Deploy\n\n**URL:** [${url}](${url})\n\n> Updated automatically on every push to this PR.`;
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

  # ──────────────────────────────────────────────
  # 6. Production deploy (main only)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netlify
        run: npx netlify-cli@17 deploy --prod --dir=dist --auth "$NETLIFY_AUTH_TOKEN" --site "$NETLIFY_SITE_ID" --message "Deploy from CI ${{ github.sha }}"

  # ──────────────────────────────────────────────
  # 7. Security audit (preserved from old CI)
  # ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [secret-scan]
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm + Node + cache
        uses: ./.github/actions/setup-pnpm-cache

      - name: Audit vulnerabilities
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"

          pnpm audit --audit-level high 2>&1 | tee "$LOG_FILE"
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          # Tolerate 5xx errors from npm audit endpoint
          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" "$LOG_FILE" && grep -Eq "responded with 5[0-9]{2}([^0-9]|$)|error \\(5[0-9]{2}\\)" "$LOG_FILE"; then
            echo "::warning::pnpm audit failed due to 5xx error from npm audit endpoint."
            exit 0
          fi

          # Don't fail the pipeline for dependency vulnerabilities — report only.
          # These are typically transitive deps waiting for upstream patches.
          echo "::warning::pnpm audit found vulnerabilities. Review and update dependencies."
          exit 0

  # ──────────────────────────────────────────────
  # 8. SonarQube analysis (only if secrets configured)
  # ──────────────────────────────────────────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [secret-scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check SonarQube configuration
        id: sonar_check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_HOST_URL" ]; then
            echo "::notice::SONAR_TOKEN or SONAR_HOST_URL not configured. SonarQube analysis skipped."
            echo "sonar_enabled=false" >> $GITHUB_OUTPUT
          else
            echo "sonar_enabled=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm + Node + cache
        if: steps.sonar_check.outputs.sonar_enabled == 'true'
        uses: ./.github/actions/setup-pnpm-cache

      - name: Run SonarScanner
        if: steps.sonar_check.outputs.sonar_enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
