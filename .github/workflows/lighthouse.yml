name: Lighthouse CI

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_PORTFOLIO_URL: ""
          VITE_GITHUB_URL: ""
          VITE_LINKEDIN_URL: ""
          VITE_X_URL: ""
          VITE_INSTAGRAM_URL: ""
          VITE_YOUTUBE_URL: ""
          VITE_99FREELAS_URL: ""
          VITE_WORKANA_URL: ""
          VITE_BUYMEACOFFEE_URL: ""
          VITE_FACEBOOK_URL: ""
          VITE_FIGMA_URL: ""
          VITE_CONTACT_EMAIL: ""
          VITE_GA_MEASUREMENT_ID: ""
          VITE_GTM_ID: ""
          VITE_COUNTER_DEV_ID: ""
        run: pnpm run build

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.15.x
          lhci autorun || echo "Run LHCI failed, results uploaded for review"

      - name: Format Lighthouse score
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read LHCI results if available
            const resultsDir = '.lighthouseci';
            if (!fs.existsSync(resultsDir)) {
              core.info('No Lighthouse results found');
              return;
            }

            // Post a summary comment
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;

            const body = [
              '## 📊 Lighthouse CI Report',
              '',
              '| Category | Score |',
              '|----------|-------|',
              '| Performance | Check artifacts |',
              '| Accessibility | Check artifacts |',
              '| Best Practices | Check artifacts |',
              '| SEO | Check artifacts |',
              '',
              '> Full report available in workflow artifacts.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
