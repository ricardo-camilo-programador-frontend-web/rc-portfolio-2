# Auto-labeling rules for actions/labeler@v5
# Docs: https://github.com/actions/labeler
#
# labeler@v5 changed the config format from v4:
# - "anyGlobToInclude" → "any-glob-to-any-file"
# - Changed in https://github.com/actions/labeler/releases/tag/v5.0.0

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'

config:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - '*.config.*'
          - 'tsconfig.*'
          - 'biome.json'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'docs/**'

i18n:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/constants/translations/**'

accessibility:
  - changed-files:
      - any-glob-to-any-file:
          - 'src/components/**'
