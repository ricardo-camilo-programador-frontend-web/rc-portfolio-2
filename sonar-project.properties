# ============================================================================
# SonarQube Configuration - Portfolio 2.0
# Based on SGS_WEB_DEVELOPER_DEV reference implementation
# ============================================================================
sonar.projectKey=portfolio2-0
sonar.projectName=Portfolio 2.0
sonar.projectVersion=1.1.0
sonar.sources=src
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**,*.tsbuildinfo,**/*.d.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**

# Coverage (if available)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
